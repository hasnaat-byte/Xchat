{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto mt-6">

    <div class="bg-white rounded shadow">

        <div class="bg-green-500 text-white p-4 rounded-t">
            {{ other_user.username }}
        </div>

        <div class="h-96 overflow-y-auto p-4 bg-gray-50">

            {% for message in messages %}

                {% if message.sender == request.user %}

                    <div class="text-right mb-3">
                        <span class="bg-green-500 text-white px-4 py-2 rounded inline-block">
                            {{ message.text }}
                        </span>
                    </div>

                {% else %}

                    <div class="text-left mb-3">
                        <span class="bg-gray-300 px-4 py-2 rounded inline-block">
                            {{ message.text }}
                        </span>
                    </div>

                {% endif %}

            {% endfor %}

        </div>

        <form method="post" class="flex gap-2 p-4 border-t">

            {% csrf_token %}

            <input
                type="text"
                name="text"
                placeholder="Type a message..."
                class="flex-1 border rounded px-4 py-2"
            >

            <button
                class="bg-green-500 text-white px-6 py-2 rounded"
            >
                Send
            </button>

        </form>

    </div>

</div>

{% endblock %}
