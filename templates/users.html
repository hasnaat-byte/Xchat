{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto mt-6 bg-white rounded shadow p-6">

    <h2 class="text-2xl font-bold mb-4">
        Users
    </h2>

    {% for user in users %}

        <a
            href="{% url 'chat' user.id %}"
            class="block p-4 border rounded mb-2 hover:bg-green-100"
        >
            {{ user.username }}
        </a>

    {% endfor %}

</div>

{% endblock %}
